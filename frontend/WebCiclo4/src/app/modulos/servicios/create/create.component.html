<div class="container form-container">
  <h3 class="center-align titulo-form">Registrar Servicios</h3>
  <form [formGroup]="fgValidacion" (ngSubmit)="store()">
    
    <!-- ORIGEN / DESTINO -->
    <div class="row">
      <div class="input-field col s12 m6">
        <select class="browser-default" formControlName="origen">
          <option value="" disabled selected>Seleccione el cliente origen</option>
          <option *ngFor="let cliente of listadoClientes"
            [value]="cliente.nombre + ' - ' + cliente.apellidos + ' - ' + cliente.departamento + ' - ' + cliente.ciudad">
            {{cliente.nombre}} - {{cliente.apellidos}} - {{cliente.departamento}} - {{cliente.ciudad}}
          </option>
        </select>
      </div>
      <div class="input-field col s12 m6">
        <select class="browser-default" formControlName="destino">
          <option value="" disabled selected>Seleccione el cliente destino</option>
          <option *ngFor="let cliente of listadoClientes"
            [value]="cliente.nombre + ' - ' + cliente.apellidos + ' - ' + cliente.departamento + ' - ' + cliente.ciudad">
            {{cliente.nombre}} - {{cliente.apellidos}} - {{cliente.departamento}} - {{cliente.ciudad}}
          </option>
        </select>
      </div>
    </div>

    <!-- FECHA / HORA -->
    <div class="row">
      <div class="input-field col s12 m6">
        <input formControlName="fecha" type="date" class="validate" />
        <label class="active" for="fecha">Fecha</label>
      </div>
      <div class="input-field col s12 m6">
        <input formControlName="hora" type="text" class="validate" />
        <label class="active" for="hora">Hora</label>
      </div>
    </div>

    <!-- ENCOMIENDA / VALOR -->
    <div class="row">
      <div class="input-field col s12 m6">
        <select class="browser-default" formControlName="encomienda">
          <option value="" disabled selected>Seleccione la encomienda</option>
          <option *ngFor="let encomienda of listadoEncomiendas"
            [value]="encomienda.descripcion">
            {{encomienda.descripcion}}
          </option>
        </select>
      </div>
      <div class="input-field col s12 m6">
        <input formControlName="valor" type="number" class="validate" />
        <label class="active" for="valor">Valor</label>
      </div>
    </div>

    <!-- BOTÓN -->
    <div class="row center-align">
      <button
        [disabled]="!fgValidacion.valid"
        class="btn waves-effect waves-light"
        type="submit"
      >
        Enviar
        <i class="material-icons right">send</i>
      </button>
    </div>

  </form>
</div>
