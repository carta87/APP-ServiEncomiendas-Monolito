<div class="container form-container">
  <h3 class="center-align titulo-form">Registrar Cliente</h3>

  <form [formGroup]="fgValidacion" (ngSubmit)="store()">

    <!-- cedula / nombre / apellidos -->
    <div class="row">
      <div class="input-field col s12 m6 l4">
        <input formControlName="cedula" type="text" class="validate"/>
        <label for="cedula">Cedula</label>
      </div>
      <div class="input-field col s12 m6 l4">
        <input formControlName="nombre" type="text" class="validate"/>
        <label for="nombre">Nombre</label>
      </div>
      <div class="input-field col s12 m6 l4">
        <input formControlName="apellidos" type="text" class="validate"/>
        <label for="apellidos">Apellidos</label>
      </div>
    </div>

    <!-- ubicación -->
    <div class="row">
      <div class="input-field col s12 m6 l3">
        <input formControlName="pais" type="text" class="validate"/>
        <label for="pais">Pais</label>
      </div>
      <div class="input-field col s12 m6 l3">
        <input formControlName="ciudad" type="text" class="validate"/>
        <label for="ciudad">Ciudad</label>
      </div>
      <div class="input-field col s12 m6 l3">
        <input formControlName="departamento" type="text" class="validate"/>
        <label for="departamento">Departamento</label>
      </div>
      <div class="input-field col s12 m6 l3">
        <input formControlName="direccion" type="text" class="validate"/>
        <label for="direccion">Direccion</label>
      </div>
    </div>

    <!-- contacto -->
    <div class="row">
      <div class="input-field col s12 m6">
        <input formControlName="telefono" type="text" class="validate"/>
        <label for="telefono">Telefono</label>
      </div>
      <div class="input-field col s12 m6">
        <input formControlName="email" type="email" class="validate"/>
        <label for="email">Email</label>
        <span
          class="helper-text"
          data-error="email invalido"
          data-success="correcto"
        >
          Estado
        </span>
      </div>
    </div>

    <!-- botón -->
    <div class="row center-align">
      <button
        [disabled]="!fgValidacion.valid"
        class="btn waves-effect waves-light"
        type="submit"
      >
        Enviar
        <i class="material-icons right">send</i>
      </button>
    </div>

  </form>
</div>
