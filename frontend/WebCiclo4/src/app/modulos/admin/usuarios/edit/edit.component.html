<div class="container form-container">
  <h3 class="center-align titulo-form">Editar Usuario</h3>
  
  <form [formGroup]="fgValidacion" (ngSubmit)="edit()">
    <input formControlName="id" type="hidden">
    
    <!-- nombre / apellidos -->
    <div class="row">
      <div class="input-field col s12 m6">
        <input formControlName="nombre" type="text" class="validate">
        <label class="active" for="nombre">Nombre</label>
      </div>
      <div class="input-field col s12 m6">
        <input formControlName="apellidos" type="text" class="validate">
        <label class="active" for="apellidos">Apellidos</label>
      </div>
    </div>

    <!-- telefono -->
    <div class="row">
      <div class="input-field col s12">
        <input formControlName="telefono" type="text" class="validate">
        <label class="active" for="telefono">Telefono</label>
      </div>
    </div>

    <!-- correo -->
    <div class="row">
      <div class="input-field col s12">
        <input formControlName="correo" type="email" class="validate">
        <label class="active" for="correo">Correo</label>
        <span class="helper-text" data-error="Correo invalido" data-success="correcto">
          Estado
        </span>
      </div>
    </div>

    <!-- boton -->
    <div class="row center-align">
      <button
        [disabled]="!fgValidacion.valid"
        class="btn waves-effect waves-light"
        type="submit"
      >
        Editar
        <i class="material-icons right">send</i>
      </button>
    </div>

  </form>
</div>
